<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stvnmn.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --fg: #e8e4dc;
      --muted: #4a4a4a;
      --accent: #c9b99a;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist Mono', monospace;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem 3rem;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header, main, footer {
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      letter-spacing: 0.08em;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    .status {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .status span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      animation: pulse 2.5s ease-in-out infinite;
    }

    main {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(4rem, 12vw, 10rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    .headline em {
      font-style: italic;
      color: var(--accent);
    }

    .subline {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      max-width: 260px;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.55s;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .footer-left {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.7s;
    }

    .footer-note {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      line-height: 1.8;
    }

    .footer-right {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .year {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(5rem, 10vw, 8rem);
      line-height: 1;
      color: var(--muted);
      opacity: 0.25;
      letter-spacing: -0.03em;
      user-select: none;
    }

    /* Decorative line */
    .rule {
      position: fixed;
      top: 0;
      left: 3rem;
      width: 1px;
      height: 100vh;
      background: linear-gradient(to bottom, transparent, var(--muted) 30%, var(--muted) 70%, transparent);
      opacity: 0.12;
      z-index: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @media (max-width: 600px) {
      body { padding: 1.8rem 1.5rem; }
      .rule { display: none; }
      .year { font-size: 4.5rem; }
    }
  </style>
</head>
<body>

  <div class="rule"></div>

  <header>
    <div class="wordmark">stvnmn.com</div>
    <div class="status"><span></span>In progress</div>
  </header>

  <main>
    <h1 class="headline">Coming<br /><em>Soon.</em></h1>
    <p class="subline">Something is being built here. Check back later.</p>
  </main>

  <footer>
    <div class="footer-left">
      <p class="footer-note">Portfolio &amp; work<br />Launching soon</p>
    </div>
    <div class="footer-right">
      <div class="year">2025</div>
    </div>
  </footer>

</body>
</html>
